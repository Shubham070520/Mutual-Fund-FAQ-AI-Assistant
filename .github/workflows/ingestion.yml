# Daily full ingest: scrape → normalize → chunk → embed → local Chroma upsert.
#
# Schedule: every day at 10:30 India Standard Time (IST).
#   GitHub Actions cron is UTC; India has no DST → 10:30 IST == 05:00 UTC → cron "0 5 * * *".
#
# Same sequence runs on manual "Run workflow" (workflow_dispatch).
#
# Implementation: src/ingestion/pipeline.py + src/processing/indexer.py
#   Step 1 — Scrape URL corpus → clean → chunk → enrich → save (data/raw/, data/processed/)
#   Step 2 — Embed chunks with BGE → upsert to on-disk ChromaDB (data/vectordb/)

name: Daily ingest (10:30 IST)

on:
  schedule:
    # 05:00 UTC == 10:30 IST (Asia/Kolkata, year-round)
    - cron: "0 5 * * *"
  workflow_dispatch: {}

concurrency:
  group: ingest-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  daily-ingest:
    name: Scrape → normalize → chunk & embed → Chroma (local)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      # Cache embedding model (BAAI/bge-small-en-v1.5) between runs
      HF_HOME: ${{ github.workspace }}/.cache/huggingface

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: .cache/huggingface
          key: hf-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            hf-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      # --- Step 1: scrape → clean → chunk → enrich → save to disk ---
      - name: Ingestion pipeline (scrape, clean, chunk)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python -m src.ingestion.pipeline

      # --- Step 2: embed chunks → upsert to local ChromaDB ---
      - name: Indexer (embed + ChromaDB upsert)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python -m src.processing.indexer

      # --- Commit updated data back to the repository ---
      - name: Commit and push updated corpus
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: daily ingestion $(date -u +%Y-%m-%d)"
          git push

      # --- Upload artifacts for debugging ---
      - name: Upload raw scraped documents
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ingest-raw-${{ github.run_id }}
          path: data/raw/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload processed chunks
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ingest-chunks-${{ github.run_id }}
          path: data/processed/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload ChromaDB persist directory (vector index)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ingest-vectordb-${{ github.run_id }}
          path: data/vectordb/
          if-no-files-found: warn
          retention-days: 14
